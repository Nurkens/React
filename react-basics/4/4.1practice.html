<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        body{
            font-family: Arial;
        }
        button{
            background-color: rgb(0,123,255);
            border: none;
            margin-top:20px;
            margin-right: 10px;
            font-size:14px;
            padding:10px;
            border-radius: 5px;
            color:white;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function LoginForm() {

        const[status,toggleStatus] = useToggle('ON')
        
        
        return (
          <>
            <div>
              <input placeholder="Email" />
            </div>
            <div>
              <input placeholder="Password" type={status === 'ON'? 'text' : 'password'} />
              <button onClick={toggleStatus}>{status === 'ON' ? 'Hide' : 'Show'}</button>
            </div>
            
            <button>Login</button>
            <button>Sign up</button>
          </>
        );
      }
      function useToggle(initialValue = 'ON'){
        const [value,setValue] = React.useState(initialValue);

        function toggle(){
            setValue(value === 'ON' ? 'OFF' : 'ON');

            
        }
        return[value,toggle]
      }

      function App() {
        return (
          <>
            <p>Hello, welcome to my website</p>
            <LoginForm />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
